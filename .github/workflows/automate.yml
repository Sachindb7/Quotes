name: Quote Automator - Upload Short

on:
  schedule:
    - cron: '30 4 * * *'     # 4:30 AM UTC  = 10:00 AM IST (Subah)
    - cron: '30 10 * * *'    # 10:30 AM UTC = 4:00 PM IST (Shaam)
    - cron: '30 15 * * *'    # 3:30 PM UTC  = 9:00 PM IST (Raat)
  workflow_dispatch:          # Manual trigger bhi kar sakta hai

permissions:
  contents: write

jobs:
  upload-short:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout repo
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: 📦 Install Python deps
        run: pip install -r requirements.txt

      - name: 🔐 Setup credentials
        run: |
          echo '${{ secrets.CLIENT_SECRET_JSON }}' > client_secret.json
          echo '${{ secrets.YOUTUBE_TOKEN }}' > token.json

      - name: 🚀 Run automator
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python main.py

      - name: 🔑 Update token secret
        if: always()
        run: |
          if [ -f token.json ]; then
            echo "Token file exists, will be committed if changed"
          fi

      - name: 📝 Commit updated quotes file
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add quotes.txt
          git add token.json || true
          git diff --staged --quiet || git commit -m "✅ Quote used and removed [skip ci]"
          git push
